      {
        "@context": "https://schema.org",

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Dataset",
        "name": "Baseload — The Capacity Gap dataset",
        "description": "U.S. nuclear reactor inventory, license actions, daily power status, and the build pipeline, compiled from NRC and EIA public records and re-derived weekly against those sources.",
        "url": "https://baseload-capacity-gap.vercel.app/data",
        "isAccessibleForFree": true,
        "keywords": ["nuclear power", "NRC", "EIA", "electricity generation", "reactor license renewal", "energy data"],
        "creditText": "U.S. NRC and U.S. EIA",
        "distribution": [
          {
            "@type": "DataDownload",
            "encodingFormat": "application/json",
            "contentUrl": "%VITE_SUPABASE_URL%/rest/v1/reactors?select=*&apikey=%VITE_SUPABASE_ANON_KEY%"
          },
          {
            "@type": "DataDownload",
            "encodingFormat": "application/json",
            "contentUrl": "%VITE_SUPABASE_URL%/rest/v1/gap_series?select=*&apikey=%VITE_SUPABASE_ANON_KEY%"
          }
        ]
      }
