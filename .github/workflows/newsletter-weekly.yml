name: Weekly Newswire Digest

on:
  schedule:
    - cron: '0 12 * * 1'   # Monday 12:00 UTC
  workflow_dispatch:

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv "supabase==2.9.1" requests

      - name: Generate and publish weekly news digest
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_newsletter.py

      - name: Email the digest to subscribers
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM:      ${{ secrets.NEWSLETTER_FROM }}
        run: python scripts/send_newsletter.py
