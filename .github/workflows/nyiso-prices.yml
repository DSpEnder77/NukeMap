name: NYISO Wholesale Prices

on:
  schedule:
    - cron: '15 */6 * * *'   # every 6h: keep day-ahead and real-time fresh
  workflow_dispatch:

jobs:
  update-nyiso-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv "supabase==2.9.1" requests tzdata

      - name: Run NYISO LBMP fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/nyiso_prices.py
