name: CAISO Wholesale Prices

on:
  schedule:
    - cron: '0 16 * * *'   # 4pm UTC daily — after CAISO publishes day-ahead prices (~10am Pacific)
  workflow_dispatch:

jobs:
  update-caiso-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv "supabase==2.9.1" requests

      - name: Run CAISO day-ahead LMP fetch
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/caiso_prices.py
